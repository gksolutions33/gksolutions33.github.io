---
layout: default
---

<div class="tutorial-container">
    {% include tutorial-sidebar.html %}

    <article class="tutorial-content">
        <nav class="breadcrumb"
            style="margin-bottom: 2.5rem; font-size: 0.85rem; color: var(--muted); font-family: 'Outfit', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">
            <a href="{{ '/' | relative_url }}" style="color: var(--accent-cyan); text-decoration: none;">Home</a>
            <span style="margin: 0 0.75rem; opacity: 0.5;">/</span>
            <a href="{{ '/tutorials/' | relative_url }}"
                style="color: var(--accent-cyan); text-decoration: none;">Tutorials</a>
            <span style="margin: 0 0.75rem; opacity: 0.5;">/</span>
            <span style="color: var(--text);">{{ page.url | split: '/' | slice: 2 | first }}</span>
        </nav>

        {{ content }}

        <script>
            // Add copy buttons to all pre blocks
            document.querySelectorAll('pre').forEach(pre => {
                const button = document.createElement('button');
                button.className = 'copy-btn';
                button.innerText = 'Copy';
                button.onclick = () => {
                    const code = pre.querySelector('code').innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        button.innerText = 'Copied!';
                        setTimeout(() => button.innerText = 'Copy', 2000);
                    });
                };
                pre.appendChild(button);
            });

            // --- IDE Execution Logic ---
            const modal = document.createElement('div');
            modal.className = 'ide-modal';
            modal.id = 'ideModal';
            modal.innerHTML = `
                <div class="ide-modal-content">
                    <div class="ide-header">
                        <h3><i class="fas fa-terminal" style="color: var(--accent-cyan); margin-right: 0.5rem;"></i> GK Solutions IDE</h3>
                        <button class="ide-close" id="ideClose">&times;</button>
                    </div>
                    <div class="ide-body">
                        <div class="ide-editor">
                            <textarea id="ideCode" spellcheck="false"></textarea>
                            <div class="ide-controls">
                                <span id="ideLanguageDisplay" style="color: var(--muted); font-weight: bold; text-transform: uppercase;"></span>
                                <button class="ide-run-btn" id="ideRunBtn"><i class="fas fa-play"></i> Run Code</button>
                            </div>
                        </div>
                        <div class="ide-output">
                            <h4>Output</h4>
                            <pre class="ide-output-console" id="ideConsole">Ready...</pre>
                            <iframe class="ide-iframe-output" id="ideIframe"></iframe>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            const ideCode = document.getElementById('ideCode');
            const runBtn = document.getElementById('ideRunBtn');
            const ideConsole = document.getElementById('ideConsole');
            const ideIframe = document.getElementById('ideIframe');
            const closeBtn = document.getElementById('ideClose');
            const langDisplay = document.getElementById('ideLanguageDisplay');
            
            // Map URL categories to Piston API languages
            const langMap = {
                'python': { lang: 'python', version: '*' },
                'java': { lang: 'java', version: '*' },
                'c': { lang: 'c', version: '*' },
                'cpp': { lang: 'cpp', version: '*' },
                'arduino': { lang: 'c', version: '*' }, // Fallback to raw C for basic checks
                'sql': { lang: 'sqlite3', version: '*' },
                'javascript': { lang: 'javascript', version: '*' },
                'html': { lang: 'html' },
                'css': { lang: 'css' }
            };

            const urlPath = window.location.pathname.toLowerCase();
            let currentLangObj = null;
            let currentLangKey = 'unknown';
            for (const key in langMap) {
                if (urlPath.includes('/tutorials/' + key + '/')) {
                    currentLangObj = langMap[key];
                    currentLangKey = key;
                    break;
                }
            }

            document.querySelectorAll('.gfg-tryIt').forEach((btn) => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    // Grab code from previous PRE block
                    let curr = btn.previousElementSibling;
                    while(curr && curr.tagName.toLowerCase() !== 'pre') {
                        curr = curr.previousElementSibling;
                    }
                    if (curr) {
                        const codeElem = curr.querySelector('code');
                        ideCode.value = codeElem ? codeElem.innerText : curr.innerText;
                    } else {
                        ideCode.value = "// Could not locate code block automatically.";
                    }
                    
                    langDisplay.innerText = currentLangKey;
                    ideConsole.innerText = "Ready...";
                    ideConsole.style.display = 'block';
                    ideIframe.style.display = 'none';
                    ideIframe.srcdoc = "";
                    modal.style.display = 'flex';
                });
            });

            closeBtn.onclick = () => modal.style.display = 'none';
            window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; }

            runBtn.onclick = async () => {
                if (!currentLangObj) {
                    ideConsole.innerText = "Error: Language context unknown.";
                    return;
                }
                const code = ideCode.value;
                if (currentLangKey === 'html' || currentLangKey === 'css') {
                    ideConsole.style.display = 'none';
                    ideIframe.style.display = 'block';
                    ideIframe.srcdoc = currentLangKey === 'css' ? `<style>${code}</style><h1>Style Preview Active</h1>` : code;
                    return;
                }
                
                ideConsole.innerText = "Compiling & executing...";
                try {
                    const res = await fetch("https://emkc.org/api/v2/piston/execute", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            language: currentLangObj.lang,
                            version: currentLangObj.version,
                            files: [{ content: code }]
                        })
                    });
                    const data = await res.json();
                    if (data.run && data.run.output !== undefined) {
                        ideConsole.innerText = data.run.output || "[Program finished with no output]";
                    } else {
                        ideConsole.innerText = "API Error:\n" + JSON.stringify(data, null, 2);
                    }
                } catch (err) {
                    ideConsole.innerText = "Network Error: " + err.message;
                }
            };
        </script>
    </article>
</div>
